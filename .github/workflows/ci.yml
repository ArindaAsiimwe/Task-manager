name: CI/CD Pipeline — Railway Auto-Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --check src/index.js

      - name: Verify project structure
        run: |
          echo "Checking required files..."
          test -f package.json && echo "  ✓ package.json"
          test -f src/index.js && echo "  ✓ src/index.js"
          test -f src/db/connection.js && echo "  ✓ src/db/connection.js"
          test -f src/routes/tasks.js && echo "  ✓ src/routes/tasks.js"
          test -f src/db/init.js && echo "  ✓ src/db/init.js"
          echo "All files present!"

  # Railway automatically deploys on push to main branch
  # when the GitHub repo is linked to a Railway project.
  # No additional deploy step is needed here.
  deploy-note:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deployment info
        run: |
          echo "   Railway will automatically deploy this commit."
          echo "   Railway detects pushes to main and triggers a new build."
          echo "   No manual deployment step required."
